apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: carelink
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: carelink/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: carelink-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: Jwt__Key
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: carelink-config
                  key: Jwt__Issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: carelink-config
                  key: Jwt__Audience
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                configMapKeyRef:
                  name: carelink-config
                  key: AuthDb__ConnectionString
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: carelink
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
      name: http
  type: ClusterIP
