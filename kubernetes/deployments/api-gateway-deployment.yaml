apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: carelink
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: carelink/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: carelink-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: Jwt__Key
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:5002"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:5003"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:5004"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine-service:5007"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:5008"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:5010"
            - name: ReverseProxy__Clusters__symptom-check-cluster__Destinations__symptom-check__Address
              value: "http://symptom-check-service:8000/"
            - name: ReverseProxy__Clusters__chatbot-cluster__Destinations__chatbot__Address
              value: "http://chatbot-service:8001/"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: carelink
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 5000
      name: http
  type: LoadBalancer
