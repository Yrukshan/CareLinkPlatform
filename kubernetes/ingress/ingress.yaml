apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carelink-ingress
  namespace: carelink
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.carelinkplatform.com
      secretName: carelink-tls
  rules:
    - host: api.carelinkplatform.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 5001
          - path: /api/patients
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 5002
          - path: /api/doctors
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 5003
          - path: /api/appointments
            pathType: Prefix
            backend:
              service:
                name: appointment-service
                port:
                  number: 5004
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 5010
          - path: /api/telemedicine
            pathType: Prefix
            backend:
              service:
                name: telemedicine-service
                port:
                  number: 5007
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 5008
          - path: /api/symptom-checker
            pathType: Prefix
            backend:
              service:
                name: symptom-check-service
                port:
                  number: 8000
          - path: /api/chatbot
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: 8001
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 80
