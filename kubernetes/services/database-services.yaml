---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: carelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: RabbitMq__Password
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: carelink
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
    - port: 15672
      targetPort: 15672
  type: ClusterIP
