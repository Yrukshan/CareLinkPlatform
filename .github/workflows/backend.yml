# CareLink Platform - Backend CI/CD
# This workflow builds, tests, and optionally deploys the .NET backend services

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

env:
  DOTNET_VERSION: "8.0.x"
  BUILD_CONFIGURATION: "Release"

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore careLinkPlatform.sln
        continue-on-error: false

      - name: Build Solution
        run: dotnet build careLinkPlatform.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
        continue-on-error: false

      - name: Run Tests
        run: |
          # Find and run all test projects
          dotnet test careLinkPlatform.sln \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: "**/coverage.cobertura.xml"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "backend/"
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()

    strategy:
      matrix:
        service:
          [
            ApiGateway,
            AuthService,
            PaymentService,
            AppointmentService,
            DoctorService,
            PatientService,
            NotificationService,
            TelemedicineService,
            SymptomCheckService,
            ChatbotService
          ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build ${{ matrix.service }} Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/Services/${{ matrix.service }}
          file: ./backend/Services/${{ matrix.service }}/Dockerfile
          push: false
          tags: carelink/${{ matrix.service }}:latest
        continue-on-error: true

  linting:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Format Check
        run: |
          dotnet format careLinkPlatform.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: always()

    steps:
      - name: Job Status
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ]; then
            echo "✅ Backend build and tests passed!"
          else
            echo "❌ Backend build or tests failed!"
          fi
